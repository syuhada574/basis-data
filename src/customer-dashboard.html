<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Dashboard - Companion Rent</title>
  <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
  <link rel="stylesheet" href="/src/css/style.css" />
  <link rel="stylesheet" href="/src/css/navigation.css" />
  <link rel="stylesheet" href="/src/css/dashboard.css" />
</head>
<body class="sidebar-page">
  <div id="sidebar-container"></div>

  <main class="sidebar-main">
    <div class="container">
      <div id="breadcrumb-area"></div>
      <div class="loading" id="initial-loading">
        <div style="border:4px solid #f3f3f3; border-top:4px solid #10b981; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:0 auto 1rem;"></div>
        <p>Memuat dashboard...</p>
      </div>
      <div id="dashboard-content"></div>
    </div>
  </main>

  <script type="module">
    import { Auth } from './js/auth.js';
    import { Navigation } from './js/navigation.js';
    import { CustomerDashboard } from './js/dashboardCustomer.js';

    await Navigation.setupForLoggedInPage('dashboard');
    Navigation.renderBreadcrumb('breadcrumb-area');

    // Guard: if a freelancer landed here, redirect them to the freelancer dashboard
    if (Auth.currentUser && Auth.currentUser.role !== 'customer') {
      window.location.replace('/src/freelancer-dashboard.html');
    }

    const dash = CustomerDashboard;
    await dash.init();
  </script>
</body>
</html>
