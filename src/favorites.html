<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorite Services - NimTask</title>
  <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg">
  <link rel="stylesheet" href="/src/css/style.css">
  <link rel="stylesheet" href="/src/css/navigation.css">
  <style>
    .favorites-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .favorites-header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: #1e1b4b;
      margin-bottom: 0.5rem;
    }

    .favorites-header p {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .favorites-count {
      display: inline-block;
      background: #eef2ff;
      color: #4f46e5;
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin: 1.5rem 0;
    }

    .service-card-modern {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid #f3f4f6;
    }

    .service-card-modern:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.15);
    }

    .service-card-body {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .service-card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1e1b4b;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .service-card-description {
      color: #6b7280;
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 1rem;
      flex: 1;
    }

    .service-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .service-card-meta-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: #6b7280;
      background: #f9fafb;
      padding: 0.3rem 0.7rem;
      border-radius: 8px;
    }

    .service-card-meta-item .label {
      font-weight: 600;
      color: #374151;
    }

    .category-badge {
      background: #eef2ff;
      color: #4f46e5;
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-block;
    }

    .freelancer-name {
      font-weight: 600;
      color: #374151;
    }

    .rating-stars {
      color: #f59e0b;
      font-weight: 700;
    }

    .price-tag {
      font-size: 1.25rem;
      font-weight: 800;
      color: #059669;
    }

    .service-card-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #f3f4f6;
    }

    .service-card-actions .btn {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary-custom {
      background: #4f46e5;
      color: white;
    }

    .btn-primary-custom:hover {
      background: #3730a3;
    }

    .btn-outline-custom {
      background: transparent;
      color: #4f46e5;
      border: 2px solid #e5e7eb;
    }

    .btn-outline-custom:hover {
      border-color: #4f46e5;
      background: #f5f3ff;
    }

    .empty-state-find {
      text-align: center;
      padding: 3rem 1.5rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .empty-state-find .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-state-find h3 {
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .empty-state-find p {
      color: #9ca3af;
      margin-bottom: 1rem;
    }

    .loading-skeleton {
      text-align: center;
      padding: 3rem;
      color: #6b7280;
    }

    .login-required {
      max-width: 480px;
      margin: 4rem auto;
      text-align: center;
      padding: 2.5rem 2rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .login-required .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .login-required h2 {
      color: #1e1b4b;
      margin-bottom: 0.75rem;
    }

    .login-required p {
      color: #6b7280;
      margin-bottom: 1.5rem;
    }

    .login-required a {
      display: inline-block;
      background: #4f46e5;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }

    .login-required a:hover {
      background: #3730a3;
    }

    @media (max-width: 768px) {
      .services-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="sidebar-page">
  <div id="sidebar-container"></div>

  <main class="sidebar-main">
    <div class="container">
      <div id="breadcrumb-area"></div>
      <div id="page-content">
        <div class="loading-skeleton">Memuat favorit...</div>
      </div>
    </div>
  </main>

  <script type="module">
    import { Auth } from './js/auth.js';
    import { Navigation } from './js/navigation.js';
    import { Toast } from './js/toast.js';
    import { FavoriteAPI } from './js/favorite.js';

    const pageContent = document.getElementById('page-content');

    async function init() {
      await Navigation.setupForLoggedInPage('favorites');
      Navigation.renderBreadcrumb('breadcrumb-area');

      if (!Auth.currentUser) {
        renderLoginRequired();
        return;
      }

      await renderFavorites();
    }

    function renderLoginRequired() {
      pageContent.innerHTML = `
        <div class="login-required fade-in">
          <div class="icon">🔒</div>
          <h2>Login Diperlukan</h2>
          <p>Silakan login untuk melihat daftar service favorit Anda.</p>
          <a href="/src/login.html">Login Sekarang</a>
        </div>
      `;
    }

    async function renderFavorites() {
      pageContent.innerHTML = `
        <div class="card fade-in" style="padding: 2rem;">
          <div class="favorites-header">
            <h1>My Favorite Services</h1>
            <p>Service yang Anda simpan untuk dilihat kembali nanti.</p>
            <span class="favorites-count" id="favorites-count">Memuat...</span>
          </div>
          <div id="favorites-grid" class="services-grid">
            <div class="loading-skeleton">Memuat favorit...</div>
          </div>
        </div>
      `;

      const grid = document.getElementById('favorites-grid');
      const countEl = document.getElementById('favorites-count');

      const { data: favorites, error } = await FavoriteAPI.getMyFavorites();

      if (error) {
        Toast.error('Gagal memuat favorit');
        grid.innerHTML = `<div class="loading-skeleton">Gagal memuat favorit.</div>`;
        countEl.textContent = '0 favorit';
        return;
      }

      // Update count
      const total = favorites?.length || 0;
      countEl.textContent = `${total} favorit`;

      // Render list
      FavoriteAPI.renderList(grid, favorites);

      // Bind favorite toggles (unfavorite from this page)
      FavoriteAPI.setupClickHandlers(grid, async (serviceId, isFavNow) => {
        // If user just unfavorited from this page, remove the card
        if (!isFavNow) {
          const card = grid.querySelector(`[data-fav-card="${serviceId}"]`);
          if (card) {
            card.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
            card.style.opacity = '0';
            card.style.transform = 'scale(0.95)';
            setTimeout(() => {
              card.remove();
              const newCount = grid.querySelectorAll('.service-card-modern').length;
              countEl.textContent = `${newCount} favorit`;
              if (newCount === 0) {
                FavoriteAPI.renderList(grid, []);
              }
            }, 200);
          }
        }
      });
    }

    init();
  </script>
</body>

</html>
