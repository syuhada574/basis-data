<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - NimTask</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon-Bs_r76O8.svg">
    <style>
        .messages-page { height: calc(100vh - 2rem); min-height: 600px; display: grid; grid-template-columns: 320px 1fr; gap: 1rem; }
        .messages-card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; border: 1px solid #f3f4f6; }
        .messages-list-header, .chat-area-header { padding: 1rem 1.25rem; border-bottom: 1px solid #eef2ff; background: #fafbff; }
        .messages-list-header h2, .chat-area-header h2 { margin: 0; font-size: 1.05rem; color: #1e1b4b; font-weight: 700; }
        .messages-list-header p { margin: 0.15rem 0 0 0; font-size: 0.78rem; color: #6b7280; }
        .messages-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
        .conversation-item { display: flex; gap: 0.75rem; align-items: center; padding: 0.75rem; border-radius: 12px; cursor: pointer; transition: background 0.15s ease; border: 1px solid transparent; }
        .conversation-item:hover { background: #f3f4f6; }
        .conversation-item.active { background: #eef2ff; border-color: #c7d2fe; }
        .conv-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
        .conv-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .conv-body { flex: 1; min-width: 0; }
        .conv-name { font-weight: 600; color: #1e1b4b; font-size: 0.92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-preview { font-size: 0.8rem; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 0.15rem; }
        .conv-meta { text-align: right; flex-shrink: 0; font-size: 0.72rem; color: #9ca3af; }
        .conv-unread { display: inline-block; background: #ef4444; color: white; border-radius: 10px; padding: 1px 6px; font-size: 0.65rem; font-weight: 700; margin-top: 0.25rem; }
        .chat-area { display: flex; flex-direction: column; }
        .chat-area-header { display: flex; align-items: center; gap: 0.85rem; }
        .chat-area-header .conv-avatar { width: 40px; height: 40px; }
        .chat-partner-name { font-weight: 700; color: #1e1b4b; font-size: 1rem; margin: 0; }
        .chat-partner-sub { font-size: 0.75rem; color: #6b7280; margin: 0; }
        .chat-job-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; padding: 3px 8px; background: #eef2ff; border-radius: 6px; cursor: pointer; font-size: 0.72rem; color: #4f46e5; font-weight: 600; transition: background 0.15s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .chat-job-link:hover { background: #c7d2fe; }
        .chat-job-link svg { flex-shrink: 0; }
        .conv-service-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 2px; padding: 2px 5px; background: #f0fdf4; border-radius: 4px; font-size: 0.65rem; color: #16a34a; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .conv-service-badge svg { flex-shrink: 0; stroke: #16a34a; }
        .chat-area-body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .chat-area-body .chat-messages { background: #f8fafc; }
        .chat-area-body .chat-input-area { background: #ffffff; border-top: 1px solid #eef2ff; }
        .empty-chat-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; color: #6b7280; }
        .empty-chat-area .big-emoji { font-size: 3.5rem; margin-bottom: 0.75rem; }
        .empty-chat-area h3 { color: #1e1b4b; margin: 0 0 0.5rem 0; font-size: 1.15rem; }
        .empty-chat-area p { margin: 0; font-size: 0.9rem; max-width: 320px; }
        .empty-list { padding: 2.5rem 1rem; text-align: center; color: #6b7280; }
        .empty-list .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .mobile-back { display: none; background: transparent; border: none; color: #4f46e5; font-size: 1.25rem; cursor: pointer; padding: 0.25rem 0.5rem; margin-right: 0.25rem; }
        .conversations-pane { display: flex; }
        .chat-pane { display: flex; }
        @media (max-width: 768px) {
            .messages-page { grid-template-columns: 1fr; gap: 0; }
            .messages-page.show-chat .conversations-pane { display: none; }
            .messages-page:not(.show-chat) .chat-pane { display: none; }
            .mobile-back { display: inline-flex; }
        }
    </style>
  <script type="module" crossorigin src="../assets/chat-DA0rezcv.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/supabase-DpcGZ4zR.js">
  <link rel="modulepreload" crossorigin href="../assets/navigation-BuHrXOWh.js">
  <link rel="modulepreload" crossorigin href="../assets/toast-CJuW2s6j.js">
  <link rel="stylesheet" crossorigin href="../assets/navigation-BWeC2596.css">
  <link rel="stylesheet" crossorigin href="../assets/chat-CapmM-QY.css">
</head>
<body class="sidebar-page">
  <div id="sidebar-container"></div>
    <main class="sidebar-main">
        <div style="height: 100%; padding: 1rem;">
            <div id="messages-page" class="messages-page">
                <div class="messages-card conversations-pane">
                    <div class="messages-list-header">
                        <h2>Pesan</h2>
                        <p id="messages-list-sub">Percakapan Anda</p>
                    </div>
                    <div id="conversations-list" class="messages-list">
                        <div class="empty-list"><div class="icon">Memuat</div><p>Memuat percakapan...</p></div>
                    </div>
                </div>
                <div class="messages-card chat-pane chat-area">
                    <div class="chat-area-header">
                        <button class="mobile-back" id="mobile-back-btn" type="button" aria-label="Kembali">&larr;</button>
                        <div id="chat-partner-avatar" class="conv-avatar">?</div>
                        <div style="flex:1; min-width:0;">
                            <h2 id="chat-partner-name" class="chat-partner-name">Pilih percakapan</h2>
                            <p id="chat-partner-sub" class="chat-partner-sub">Pilih percakapan di sebelah kiri</p>
                            <div id="chat-job-link" class="chat-job-link" style="display:none;"></div>
                        </div>
                    </div>
                    <div class="chat-area-body">
                        <div id="chat-empty-state" class="empty-chat-area">
                            <div class="big-emoji">&#128172;</div>
                            <h3>Mulai percakapan baru</h3>
                            <p>Pilih percakapan dari daftar, atau buka halaman detail service untuk menghubungi freelancer.</p>
                        </div>
                        <div id="chat-messages" class="chat-messages" style="display:none;"></div>
                        <div class="chat-input-area" id="chat-input-area" style="display:none;">
                            <div style="flex:1;position:relative;">
                                <textarea id="chat-input" placeholder="Ketik pesan..." rows="1"></textarea>
                            </div>
                            <button id="send-btn" disabled>Kirim</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
