<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - NimTask</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon-Bs_r76O8.svg">
  <style>
    .auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1rem;
    }

    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.5s ease forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-card h1 {
      font-size: 1.75rem;
      text-align: center;
      margin-bottom: 0.5rem;
      color: #1f2937;
    }

    .auth-card .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .auth-card .form-group {
      margin-bottom: 1.25rem;
    }

    .auth-card label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #374151;
    }

    .auth-card input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: #f9fafb;
    }

    .auth-card input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      background: white;
    }

    .auth-card input.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }

    .auth-card button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 0.5rem;
    }

    .auth-card button[type="submit"]:hover {
      background: #4338ca;
    }

    .auth-card button[type="submit"]:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .auth-card .message-box {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    .auth-card .message-box.error {
      display: block;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .auth-card .message-box.success {
      display: block;
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .auth-card .message-box.info {
      display: block;
      background: #f0f9ff;
      color: #2563eb;
      border: 1px solid #bae6fd;
    }

    .auth-card .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .auth-card .auth-footer a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-card .auth-footer a:hover {
      text-decoration: underline;
    }

    .field-error {
      font-size: 0.8rem;
      color: #ef4444;
      margin-top: 0.25rem;
      display: none;
    }

    .field-error.visible {
      display: block;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 8px;
      width: auto;
      border-radius: 4px;
    }

    .toggle-password:hover {
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.05);
    }

    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }

    .role-option {
      padding: 0.85rem 0.5rem;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #f9fafb;
    }

    .role-option:hover {
      border-color: #4f46e5;
    }

    .role-option.selected {
      border-color: #4f46e5;
      background: #eef2ff;
    }

    .role-option .role-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
    }

    .role-option .role-desc {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }
  </style>
  <script type="module" crossorigin src="../assets/signup-K8_MPLGJ.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/supabase-DpcGZ4zR.js">
  <link rel="modulepreload" crossorigin href="../assets/navigation-BuHrXOWh.js">
  <link rel="stylesheet" crossorigin href="../assets/navigation-BWeC2596.css">
</head>
<body class="no-sidebar">
  <div id="sidebar-container"></div>

  <main>
    <div class="auth-page">
      <div class="auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Join NimTask as a customer or freelancer</p>

        <form id="signup-form" novalidate>
          <div class="form-group">
            <label for="signup-name">Nickname / Full Name</label>
            <input type="text" id="signup-name" placeholder="How should we call you?" required minlength="2" autocomplete="name">
            <div class="field-error" id="name-error">Name must be at least 2 characters</div>
          </div>

          <div class="form-group">
            <label for="signup-email">Email Address</label>
            <input type="email" id="signup-email" placeholder="your@email.com" required autocomplete="email">
            <div class="field-error" id="email-error">Please enter a valid email address</div>
          </div>

          <div class="form-group">
            <label for="signup-password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="signup-password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
              <button type="button" class="toggle-password" id="toggle-pw-btn" tabindex="-1">Show</button>
            </div>
            <div class="field-error" id="password-error">Password must be at least 6 characters</div>
          </div>

          <div class="form-group">
            <label>I want to join as</label>
            <div class="role-selector" id="role-selector">
              <div class="role-option selected" data-role="customer">
                <div class="role-label">Customer</div>
                <div class="role-desc">I want to hire freelancers</div>
              </div>
              <div class="role-option" data-role="freelancer">
                <div class="role-label">Freelancer</div>
                <div class="role-desc">I want to offer services</div>
              </div>
            </div>
          </div>

          <button type="submit" id="signup-btn">Create Account</button>
        </form>

        <div class="message-box" id="signup-message"></div>

        <div class="auth-footer">
          Already have an account? <a href="/src/login.html">Login</a>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
